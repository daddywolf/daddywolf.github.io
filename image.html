                            </div>
                            <input type="file" id="imageFolder" class="hidden" webkitdirectory directory multiple />
                        </label>
                    </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="bg-slate-50 px-5 py-3 border-b border-slate-100 flex items-center gap-2">

                     <h3 class="font-semibold text-slate-700">图片名称所在列</h3>

                <div class="p-5">

                    <div class="flex gap-2 items-center">

                        </select>
                    </div>
                    <p class="text-xs text-slate-400 mt-2">提示: 程序会自动匹配文件夹里的主流图片(JPG, PNG, GIF等)。表格里的名字带不带后缀都可以识别。</p>

                    </svg>

                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">

        <main class="lg:col-span-8 flex flex-col h-[500px] lg:h-[650px]">
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 flex flex-col flex-grow overflow-hidden">

                        </svg>
                        处理日志

                    <span id="status-badge" class="hidden px-2.5 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-full flex items-center gap-1.5">
                        <svg class="animate-spin h-3 w-3 text-blue-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        处理中...
                    </span>

                <div class="relative flex-grow bg-slate-50 p-4 overflow-hidden flex flex-col">
                    <div id="logArea" class="w-full h-full overflow-y-auto text-sm whitespace-pre-wrap font-mono custom-scrollbar p-3 leading-relaxed border border-slate-100 rounded-lg bg-white shadow-sm text-slate-600 space-y-1">
                        <div class="text-slate-400 flex items-center gap-2">
<!--                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>-->

                        </div>

        <div class="text-center mt-8 pb-4 text-slate-400 text-sm font-mono">
        JZP Exclusively Made For KYS

<script>
    // --- 全局数据中心 ---
    let currentWorkbook = null;
    let currentWorksheet = null;
    let globalExcelFile = null;
    let globalImageFiles = [];

    // --- DOM 引用 ---
    const excelInput = document.getElementById('excelFile');
    const folderInput = document.getElementById('imageFolder');
    const excelDropZone = document.getElementById('excel-drop-zone');
    const folderDropZone = document.getElementById('folder-drop-zone');
    const excelFileName = document.getElementById('excel-file-name');
    const folderInfo = document.getElementById('folder-info');
    const columnSelect = document.getElementById('columnSelect');
    const logArea = document.getElementById('logArea');
    const processBtn = document.getElementById('processBtn');

    // --- 工具：将数字列号转换为 Excel 字母列号 (例如 1 -> A, 27 -> AA) ---
    function colIndexToLetter(index) {
        let letter = '';
        while (index > 0) {
            let temp = (index - 1) % 26;
            letter = String.fromCharCode(temp + 65) + letter;
            index = (index - temp - 1) / 26;
        }
        return letter;
    }

    // --- 拖拽交互样式控制 ---
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        excelDropZone.addEventListener(eventName, preventDefaults, false);
        folderDropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(eventName => {
        excelDropZone.addEventListener(eventName, () => excelDropZone.classList.add('drag-active'), false);
        folderDropZone.addEventListener(eventName, () => folderDropZone.classList.add('drag-active'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        excelDropZone.addEventListener(eventName, () => excelDropZone.classList.remove('drag-active'), false);
        folderDropZone.addEventListener(eventName, () => folderDropZone.classList.remove('drag-active'), false);
    });

    // --- 处理 Excel 文件 (通用) ---
    async function processExcelFile(file) {
        if (!file || (!file.name.endsWith('.xlsx') && !file.name.endsWith('.xls'))) {
            return alert("请上传 .xlsx 格式的 Excel 文件！");
        }
        globalExcelFile = file;
        excelFileName.textContent = `已载入: ${file.name}`;
        excelFileName.classList.add('text-indigo-600', 'font-bold');

        try {
            columnSelect.innerHTML = '<option value="">正在读取表头...</option>';
            columnSelect.disabled = true;

            const arrayBuffer = await file.arrayBuffer();
            currentWorkbook = new ExcelJS.Workbook();
            await currentWorkbook.xlsx.load(arrayBuffer);
            currentWorksheet = currentWorkbook.worksheets[0];

            const firstRow = currentWorksheet.getRow(1);
            columnSelect.innerHTML = '';
            let hasColumns = false;

            firstRow.eachCell((cell, colNumber) => {
                hasColumns = true;
                const option = document.createElement('option');
                option.value = colNumber;
                // 使用刚刚写的转换函数，将数字转换为字母
                option.textContent = `第 ${colIndexToLetter(colNumber)} 列 - ${cell.text || '未命名列'}`;
                columnSelect.appendChild(option);
            });

            if (hasColumns) {
                columnSelect.disabled = false;
                log("成功加载 Excel 表头，请在左侧确认图片名称列。", "success");
            } else {
                columnSelect.innerHTML = '<option value="">未找到表头数据</option>';
            }
        } catch (error) {
            columnSelect.innerHTML = '<option value="">读取失败</option>';
            log(`❌ 读取表格失败: ${error.message}`, "error");
        }
    }

    // --- 处理图片文件 (通用) ---
    function processImageFiles(files) {
        globalImageFiles = [];
        for (let file of files) {
            if (file.type.startsWith('image/')) {
                globalImageFiles.push(file);
            }
        }
        if (globalImageFiles.length > 0) {
            folderInfo.textContent = `已扫描到 ${globalImageFiles.length} 张图片`;
            folderInfo.classList.add('text-indigo-600', 'font-bold');
        } else {
            folderInfo.textContent = "未发现图片，请重新选择";
            folderInfo.classList.remove('text-indigo-600', 'font-bold');
        }
    }

    // --- 递归读取拖拽的文件夹 ---
    async function getFilesFromDataTransfer(items) {
        const files = [];
        const queue = [];
        for (let i = 0; i < items.length; i++) {
            if (items[i].kind === 'file') queue.push(items[i].webkitGetAsEntry());
        }

        async function readDirectory(directoryEntry) {
            const reader = directoryEntry.createReader();
            return new Promise((resolve, reject) => {
                reader.readEntries(async (entries) => {
                    for (let entry of entries) {
                        if (entry.isFile) {
                            const file = await new Promise(res => entry.file(res));
                            files.push(file);
                        } else if (entry.isDirectory) {
                            await readDirectory(entry);
                        }
                    }
                    resolve();
                }, reject);
            });
        }

        folderInfo.textContent = "正在递归读取文件夹...";
        for (let entry of queue) {
            if (entry) {
                if (entry.isFile) {
                    const file = await new Promise(res => entry.file(res));
                    files.push(file);
                } else if (entry.isDirectory) {
                    await readDirectory(entry);
                }
            }
        }
        return files;
    }

    // --- 绑定事件 ---
    excelInput.addEventListener('change', (e) => processExcelFile(e.target.files[0]));
    folderInput.addEventListener('change', (e) => processImageFiles(Array.from(e.target.files)));

    excelDropZone.addEventListener('drop', (e) => processExcelFile(e.dataTransfer.files[0]));
    folderDropZone.addEventListener('drop', async (e) => {
        const files = await getFilesFromDataTransfer(e.dataTransfer.items);
        processImageFiles(files);
    });

    // --- 全局重置功能 ---
    function resetApp() {
        // 1. 清空数据
        currentWorkbook = null;
        currentWorksheet = null;
        globalExcelFile = null;
        globalImageFiles = [];

        // 2. 清空 Input
        excelInput.value = '';
        folderInput.value = '';

        // 3. 恢复 UI 状态
        excelFileName.textContent = "点击选择 或 拖拽Excel到此";
        excelFileName.classList.remove('text-indigo-600', 'font-bold');

        folderInfo.textContent = "点击选择 或 拖拽文件夹到此";
        folderInfo.classList.remove('text-indigo-600', 'font-bold');

        columnSelect.innerHTML = '<option value="">等待读取表格...</option>';
        columnSelect.disabled = true;

        logArea.innerHTML = `
            <div class="text-slate-400 flex items-center gap-2">
<!--                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>-->
<!--                数据已重置，等待导入新文件...-->
            </div>
        `;

        processBtn.disabled = false;
        processBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
            </svg>
            <span>开始处理并导出</span>`;
    }

    // --- 日志输出系统 ---
    function log(message, type = 'info') {
        let colorClass = 'text-slate-600';
        let icon = '<span class="text-slate-400">›</span>';

        if (type === 'success') { colorClass = 'text-emerald-600'; icon = '✅'; }
        else if (type === 'error') { colorClass = 'text-red-500 font-medium'; icon = '❌'; }
        else if (type === 'warn') { colorClass = 'text-amber-500'; icon = '⚠️'; }
        else if (type === 'system') { colorClass = 'text-indigo-600 font-medium'; icon = '🚀'; }

        const logItem = document.createElement('div');
        logItem.className = `flex gap-2 items-start ${colorClass}`;
        logItem.innerHTML = `<span class="flex-shrink-0">${icon}</span> <span>${message}</span>`;

        if (logArea.innerHTML.includes('等待导入')) logArea.innerHTML = '';
        logArea.appendChild(logItem);
        // 自动滚动到底部
        logArea.scrollTop = logArea.scrollHeight;
    }

    // --- 图片压缩与方向纠正 ---
    function processAndResizeImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                let width = img.width, height = img.height;
                const maxDim = 2048;
                if (width > maxDim || height > maxDim) {
                    if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
                    else { width = Math.round((width * maxDim) / height); height = maxDim; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.95));
            };
            img.onerror = reject;
            img.src = url;
        });
    }

    // --- 主执行流程 ---
    async function processExcel() {
        const statusBadge = document.getElementById('status-badge');
        const targetColIndex = parseInt(columnSelect.value);

        if (!currentWorkbook || !currentWorksheet) return alert("请先导入 Excel 文件并等待加载完毕！");
        if (globalImageFiles.length === 0) return alert("请先导入图片或文件夹！");
        if (isNaN(targetColIndex)) return alert("请正确选择图片名称所在的列！");

        processBtn.disabled = true;
        processBtn.innerHTML = '处理中...';
        statusBadge.classList.remove('hidden');
        logArea.innerHTML = '';
        log("开始构建图片字典...", "system");

        try {
            // 1. 构建智能字典
            const imageMap = {};
            for (let file of globalImageFiles) {
                imageMap[file.name] = file;
                imageMap[file.name.toLowerCase()] = file;
                const lastDotIndex = file.name.lastIndexOf('.');
                if (lastDotIndex !== -1) {
                    const nameWithoutExt = file.name.substring(0, lastDotIndex);
                    imageMap[nameWithoutExt] = file;
                    imageMap[nameWithoutExt.toLowerCase()] = file;
                }
            }
            log(`已缓存处理 ${globalImageFiles.length} 张图片数据，准备匹配表格。`);

            currentWorksheet.getColumn(targetColIndex).width = 18;
            let imageCount = 0;
            let emptyCount = 0;
            log(`正在扫描第 ${colIndexToLetter(targetColIndex)} 列数据...`, "system");

            // 2. 遍历 Excel 行
            for (let rowNumber = 2; rowNumber <= currentWorksheet.rowCount; rowNumber++) {
                const row = currentWorksheet.getRow(rowNumber);
                const cell = row.getCell(targetColIndex);
                const cellValue = cell.text ? cell.text.toString().trim() : "";

                if (cellValue) {
                    emptyCount = 0;
                    const matchedFile = imageMap[cellValue] || imageMap[cellValue.toLowerCase()];

                    if (matchedFile) {
                        log(`正在处理图: ${matchedFile.name} ...`);
                        row.height = 80;
                        const base64Data = await processAndResizeImage(matchedFile);
                        cell.value = "";

                        const imageId = currentWorkbook.addImage({ base64: base64Data, extension: 'jpeg' });
                        currentWorksheet.addImage(imageId, {
                            tl: { col: targetColIndex - 1, row: rowNumber - 1 },
                            ext: { width: 100, height: 100 }
                        });
                        log(`成功插入图: ${matchedFile.name} 到第 ${rowNumber} 行`, "success");
                        imageCount++;
                    } else {
                        log(`跳过第 ${rowNumber} 行：未找到名称匹配 "${cellValue}" 的图片`, "warn");
                    }
                } else {
                    emptyCount++;
                }

                if (emptyCount >= 20) {
                    log("连续 20 行无数据，跳出循环。", "system");
                    break;
                }
            }

            // 3. 导出文件
            log("正在打包生成新的 Excel 文件，请稍候...", "system");
            const buffer = await currentWorkbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `已插图_${globalExcelFile.name}`;
            link.click();
            URL.revokeObjectURL(link.href);

            log(`🎉 处理完成！共插入 ${imageCount} 张图片。文件已自动下载。`, "success");

        } catch (error) {
            console.error(error);
            log(`发生错误: ${error.message}`, "error");
        } finally {
            processBtn.disabled = false;
            processBtn.innerHTML = `

                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                </svg>
                <span>重新处理</span>`;
            statusBadge.classList.add('hidden');
        }
