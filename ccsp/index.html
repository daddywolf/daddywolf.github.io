<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCSP 多题库极速刷题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .pre-wrap { white-space: pre-wrap; word-break: break-word; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 flex flex-col h-screen overflow-hidden">

    <header class="bg-white shadow-sm z-20 shrink-0">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center border-b flex-wrap gap-2">
            <h1 class="text-lg font-bold text-blue-600 flex items-center gap-2">
                CCSP 题库系统
            </h1>
            <div class="flex gap-2 items-center">
                <select id="bank-selector" onchange="switchBank(this.value)" class="bg-gray-100 text-gray-700 text-sm px-2 py-1.5 rounded-md border-gray-200 focus:ring-blue-500 font-bold max-w-[150px] truncate">
                    </select>
                <button onclick="toggleExamMode()" id="btn-exam-mode" class="text-sm bg-indigo-50 px-3 py-1.5 rounded-md text-indigo-700 hover:bg-indigo-100 transition font-bold shrink-0">🎓 考试模式</button>
                <button onclick="toggleDataPanel()" class="text-sm bg-green-50 px-3 py-1.5 rounded-md text-green-700 hover:bg-green-100 transition font-bold shrink-0">💾 数据</button>
            </div>
        </div>
        
        <div class="max-w-3xl mx-auto px-3 py-2 bg-gray-50 flex items-center justify-between border-b gap-2">
            <div class="flex items-center gap-2 flex-1 overflow-hidden">
                <select id="filter-selector" onchange="applyFilter(this.value)" class="p-2 border-2 border-blue-200 rounded-md bg-white text-sm focus:outline-none focus:border-blue-500 font-bold text-blue-700 w-28 shrink-0">
                    <option value="all">全部题目</option>
                    <option value="todo">未做题目</option>
                    <option value="wrong">📌 错题本</option>
                    <option value="correct">已做对</option>
                </select>
                
                <select id="q-selector" onchange="jumpToQuestion(this.value)" class="flex-1 p-2 border rounded-md bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 truncate">
                </select>
            </div>

            <div id="stats-container" class="ml-2 text-xs text-gray-500 flex flex-col items-end shrink-0">
                <span>✅ <span id="count-correct" class="text-green-600 font-bold">0</span></span>
                <span>❌ <span id="count-wrong" class="text-red-600 font-bold">0</span></span>
            </div>
        </div>

        <div id="data-panel" class="hidden max-w-3xl mx-auto px-4 py-4 bg-white border-b text-sm shadow-inner">
            <p class="text-gray-500 mb-4 text-xs leading-relaxed">
                当前题库：<span id="current-bank-name" class="font-bold text-blue-600"></span><br>
                进度互相独立。导入进度时，系统会校验文件是否属于当前题库。
            </p>
            <div class="flex flex-wrap gap-2 items-center">
                <button onclick="exportProgress()" class="bg-green-600 text-white px-3 py-2 rounded shadow-sm hover:bg-green-700 font-bold flex items-center gap-1 transition">⬇️ 导出进度</button>
                <div class="relative overflow-hidden inline-block">
                    <button class="bg-yellow-500 text-white px-3 py-2 rounded shadow-sm hover:bg-yellow-600 font-bold flex items-center gap-1 transition">⬆️ 导入进度</button>
                    <input type="file" id="import-file" accept=".json" onchange="importProgress(event)" class="absolute left-0 top-0 opacity-0 cursor-pointer w-full h-full">
                </div>
                <button onclick="exportWrongQuestions()" class="bg-purple-600 text-white px-3 py-2 rounded shadow-sm hover:bg-purple-700 font-bold flex items-center gap-1 transition">📦 导出所有错题(.js)</button>
                <div class="flex-1 text-right">
                    <button onclick="clearProgress()" class="text-xs bg-red-50 text-red-600 px-3 py-1.5 rounded hover:bg-red-100 border border-red-200 transition">⚠️ 清空当前题库进度</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-4" id="main-content">
        <div class="max-w-3xl mx-auto pb-10" id="question-container">
            <div class="text-center py-20"><span class="loader"></span> 正在加载题库...</div>
        </div>
    </main>

    <footer class="bg-white border-t shrink-0 p-3 shadow-[0_-2px_10px_rgba(0,0,0,0.02)]">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <button onclick="prevQuestion()" id="btn-prev" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-6 py-3 rounded-lg font-bold transition disabled:opacity-50">⬅️ 上一题</button>
            <span id="page-indicator" class="text-sm font-bold text-gray-500">0 / 0</span>
            <button onclick="nextQuestion()" id="btn-next" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-bold shadow-md transition disabled:opacity-50">下一题 ➡️</button>
        </div>
    </footer>

    <div id="exam-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-indigo-600 px-6 py-4 flex justify-between items-center text-white shrink-0">
                <h2 class="text-xl font-bold">📊 考试成绩单</h2>
                <button onclick="closeExamModal()" class="hover:bg-indigo-700 px-2 py-1 rounded font-bold text-lg leading-none">✖</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-gray-50">
                <div class="text-center mb-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="text-5xl font-black text-indigo-600 mb-3" id="exam-score">80%</div>
                    <div class="text-gray-600 font-bold" id="exam-summary">共作答 10 题，做对 8 题，做错 2 题</div>
                </div>
                
                <h3 id="exam-mistakes-title" class="font-bold text-red-600 mb-3 text-lg hidden">❌ 错题明细：</h3>
                <div id="exam-mistakes-container" class="space-y-4">
                    </div>
            </div>
            
            <div class="bg-white border-t p-4 flex justify-end gap-3 shrink-0">
                <button onclick="exportExamMistakes()" id="btn-export-exam" class="bg-purple-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-purple-700 hidden shadow-sm">📦 导出本次错题(.js)</button>
                <button onclick="closeExamModal()" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg font-bold hover:bg-gray-300 transition">关闭并返回练习</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 1. 题库清单配置区 =================
        const AVAILABLE_BANKS = {
            'data': { name: '内部源题库 (data.js)', file: 'data.js' },
            'examtopics': { name: 'ExamTopics 题库', file: 'examtopics.js' },
            'wechat': { name: '微信小程序错题库', file: 'wechat_domain1-6.js' },
            'certleader': { name: 'CertLeader', file: 'CertLeader.js' },
            'SurePassExam': { name: 'SurePassExam', file: 'SurePassExam.js' },
            'Mock1': { name: '官方模拟1', file: '1.js' },
            'Mock2': { name: '官方模拟2', file: '2.js' }
        };

        let currentBankId = localStorage.getItem('ccsp_active_bank') || 'data';
        if (!AVAILABLE_BANKS[currentBankId]) currentBankId = 'data';

        const script = document.createElement('script');
        script.src = AVAILABLE_BANKS[currentBankId].file;
        script.onload = () => initApp(); 
        script.onerror = () => {
            document.getElementById('question-container').innerHTML = `
                <div class="p-4 bg-red-50 text-red-700 rounded-lg border border-red-200">
                    <b>❌ 加载题库文件失败！</b><br>
                    找不到文件：<code>${AVAILABLE_BANKS[currentBankId].file}</code><br>
                    请确保该文件已上传到同一目录下。
                </div>`;
        };
        document.body.appendChild(script);

        // ================= 2. 全局状态 =================
        let userProgress = {}; 
        let qData = [];
        let currentFilter = 'all'; 
        let currentList = []; 
        let listIndex = 0;    
        const storageKey = `ccsp_progress_${currentBankId}`;

        // 🎓 考试模式专属状态
        let isExamMode = false;
        let examLog = new Set(); // 记录本次考试中做过的题号
        let currentExamMistakes = []; // 暂存本次考试的错题对象，用于导出

        // ================= 3. 系统初始化 =================
        function initApp() {
            const bankSelector = document.getElementById('bank-selector');
            bankSelector.innerHTML = Object.keys(AVAILABLE_BANKS).map(key => 
                `<option value="${key}" ${key === currentBankId ? 'selected' : ''}>📚 ${AVAILABLE_BANKS[key].name}</option>`
            ).join('');
            document.getElementById('current-bank-name').innerText = AVAILABLE_BANKS[currentBankId].name;

            qData = typeof questionsData !== 'undefined' ? questionsData : [];
            userProgress = JSON.parse(localStorage.getItem(storageKey)) || {}; 

            if (qData.length === 0) {
                document.getElementById('question-container').innerHTML = `<div class="p-4 bg-yellow-50 text-yellow-700 rounded-lg">此题库文件中没有解析到有效数据。</div>`;
                return;
            }

            updateStats();
            applyFilter('all'); 
        }

        function switchBank(bankId) {
            localStorage.setItem('ccsp_active_bank', bankId);
            location.reload(); 
        }

        // ================= 🎓 考试模式核心引擎 =================
        function toggleExamMode() {
            if (!isExamMode) {
                // 进入考试
                if(!confirm("开启【考试模式】后：\n1. 选项不再提示对错\n2. 答完不会自动跳转，必须手动点下一题\n3. 🚫 不允许返回上一题\n4. 考完交卷后统一出成绩\n\n确定要从当前题目开始考试吗？")) return;
                
                isExamMode = true;
                examLog.clear(); // 清空考试记录
                
                // UI 变化
                const btn = document.getElementById('btn-exam-mode');
                btn.innerHTML = "🛑 交卷并查看成绩";
                btn.classList.replace('bg-indigo-50', 'bg-red-100');
                btn.classList.replace('text-indigo-700', 'text-red-700');
                
                document.getElementById('stats-container').classList.add('hidden'); // 隐藏对错统计
                document.getElementById('filter-selector').disabled = true; // 锁定模式切换
                document.getElementById('q-selector').disabled = true; // 锁定题目跳转
                document.getElementById('bank-selector').disabled = true; // 锁定题库切换
                
                renderQuestion(currentList[listIndex]); // 重新渲染当前题目为考试UI
            } else {
                // 结束考试并结算
                finishExam();
            }
        }

        function finishExam() {
            if (examLog.size === 0) {
                alert("你还没有作答任何题目，考试已取消。");
                exitExamUI();
                return;
            }

            // 计算成绩
            let correctCount = 0;
            currentExamMistakes = [];
            
            examLog.forEach(qId => {
                const p = userProgress[qId];
                if(p.status === 'correct') {
                    correctCount++;
                } else {
                    const qObj = qData.find(q => q["题号"] === qId);
                    currentExamMistakes.push({ ...qObj, "用户错选": p.selected });
                }
            });

            const total = examLog.size;
            const accuracy = Math.round((correctCount / total) * 100);

            // 填充弹窗内容
            document.getElementById('exam-score').innerText = `${accuracy}%`;
            document.getElementById('exam-summary').innerText = `本次共作答 ${total} 题，做对 ${correctCount} 题，做错 ${total - correctCount} 题`;
            
            const mistakesContainer = document.getElementById('exam-mistakes-container');
            const mistakesTitle = document.getElementById('exam-mistakes-title');
            const exportBtn = document.getElementById('btn-export-exam');
            
            if (currentExamMistakes.length > 0) {
                mistakesTitle.classList.remove('hidden');
                exportBtn.classList.remove('hidden');
                mistakesContainer.innerHTML = currentExamMistakes.map(q => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-red-200">
                        <div class="text-sm font-bold text-gray-500 mb-2 border-b pb-2">题目 #${q["题号"]}</div>
                        <div class="text-gray-800 font-medium mb-3 pre-wrap">${escapeHtml(q["中文题目与选项"])}</div>
                        <div class="flex flex-col sm:flex-row gap-4 text-sm bg-gray-50 p-3 rounded">
                            <div class="flex-1"><span class="text-gray-500">你的选择：</span><span class="font-bold text-red-600 text-lg">${q["用户错选"]}</span></div>
                            <div class="flex-1"><span class="text-gray-500">正确答案：</span><span class="font-bold text-green-600 text-lg">${q["答案"]}</span></div>
                        </div>
                    </div>
                `).join('');
            } else {
                mistakesTitle.classList.add('hidden');
                exportBtn.classList.add('hidden');
                mistakesContainer.innerHTML = `<div class="text-center text-gray-500 py-4">太牛了，全对！🎉</div>`;
            }

            // 显示弹窗
            document.getElementById('exam-modal').classList.remove('hidden');
            exitExamUI(); // 恢复底部 UI
        }

        function exitExamUI() {
            isExamMode = false;
            const btn = document.getElementById('btn-exam-mode');
            btn.innerHTML = "🎓 考试模式";
            btn.classList.replace('bg-red-100', 'bg-indigo-50');
            btn.classList.replace('text-red-700', 'text-indigo-700');
            
            document.getElementById('stats-container').classList.remove('hidden');
            document.getElementById('filter-selector').disabled = false;
            document.getElementById('q-selector').disabled = false;
            document.getElementById('bank-selector').disabled = false;
            
            updateStats();
            renderSelector();
            renderQuestion(currentList[listIndex]);
        }

        function closeExamModal() {
            document.getElementById('exam-modal').classList.add('hidden');
        }

        function exportExamMistakes() {
            if (currentExamMistakes.length === 0) return;
            const jsContent = "const questionsData = " + JSON.stringify(currentExamMistakes, null, 4) + ";\n";
            const dataStr = "data:text/javascript;charset=utf-8," + encodeURIComponent(jsContent);
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            const dateStr = new Date().toISOString().slice(0,10);
            dlAnchorElem.setAttribute("download", `${currentBankId}_exam_mistakes_${dateStr}.js`);
            dlAnchorElem.click();
            dlAnchorElem.remove();
        }

        // ================= 4. 模式筛选引擎 =================
        function applyFilter(type) {
            currentFilter = type;
            currentList = [];
            
            qData.forEach((q, idx) => {
                const status = userProgress[q["题号"]]?.status;
                if (type === 'all') currentList.push(idx);
                else if (type === 'todo' && !status) currentList.push(idx);
                else if (type === 'wrong' && status === 'wrong') currentList.push(idx);
                else if (type === 'correct' && status === 'correct') currentList.push(idx);
            });

            if (currentList.length === 0) {
                renderEmptyState(type);
                return;
            }

            listIndex = 0;
            if (type === 'all') {
                const firstTodoIdx = currentList.findIndex(i => !userProgress[qData[i]["题号"]]?.status);
                if (firstTodoIdx !== -1) listIndex = firstTodoIdx;
            }

            renderSelector();
            renderQuestion(currentList[listIndex]);
        }

        function renderEmptyState(type) {
            let msg = "";
            if (type === 'wrong') msg = "太棒了！你目前没有错题 🎉";
            else if (type === 'todo') msg = "牛逼！所有题目都做完了 🏆";
            else if (type === 'correct') msg = "当前还没有做对的题目，加油！💪";

            document.getElementById('question-container').innerHTML = `
                <div class="text-center py-20 bg-white rounded-2xl border border-dashed border-gray-300">
                    <h2 class="text-xl font-bold text-gray-700">${msg}</h2>
                    <p class="text-blue-500 mt-4 text-sm cursor-pointer hover:underline" onclick="document.getElementById('filter-selector').value='all'; applyFilter('all');">👉 点击返回全部题目</p>
                </div>
            `;
            document.getElementById('btn-prev').disabled = true;
            document.getElementById('btn-next').disabled = true;
            document.getElementById('page-indicator').innerText = `0 / 0`;
            document.getElementById('q-selector').innerHTML = `<option>无题目</option>`;
        }

        // ================= 5. 渲染逻辑 =================
        function parseQuestionText(text) {
            let qText = text;
            let options = null;
            const regexA = /\n\s*[(（]?[Aa][)）]?\s*[.、]?/i;
            const regexB = /\n\s*[(（]?[Bb][)）]?\s*[.、]?/i;
            const regexC = /\n\s*[(（]?[Cc][)）]?\s*[.、]?/i;
            const regexD = /\n\s*[(（]?[Dd][)）]?\s*[.、]?/i;

            const matchA = text.match(regexA);
            const matchB = text.match(regexB);
            const matchC = text.match(regexC);
            const matchD = text.match(regexD);

            if (matchA && matchB && matchC && matchD) {
                qText = text.substring(0, matchA.index).trim();
                options = {
                    'A': text.substring(matchA.index + matchA[0].length, matchB.index).trim(),
                    'B': text.substring(matchB.index + matchB[0].length, matchC.index).trim(),
                    'C': text.substring(matchC.index + matchC[0].length, matchD.index).trim(),
                    'D': text.substring(matchD.index + matchD[0].length).trim()
                };
            }
            return { qText, options };
        }

        function renderQuestion(realIndex) {
            const container = document.getElementById('question-container');
            const q = qData[realIndex];
            const qId = q["题号"];
            const progress = userProgress[qId] || {};
            
            // 如果是考试模式，不锁定选项按钮，允许反复修改
            const canEditOption = isExamMode || !progress.status;

            const engParsed = parseQuestionText(q["英文题目与选项"]);
            const chnParsed = parseQuestionText(q["中文题目与选项"]);

            let optionsHTML = '';
            const opts = ['A', 'B', 'C', 'D'];
            
            if (chnParsed.options) {
                optionsHTML = `<div class="flex flex-col gap-3 mt-6">`;
                opts.forEach(opt => {
                    optionsHTML += `
                        <button onclick="answerQuestion('${qId}', '${opt}', '${q["答案"]}')" ${canEditOption ? '' : 'disabled'}
                            class="text-left p-4 rounded-xl border-2 transition relative flex items-start gap-3
                            ${getOptionClass(opt, progress.selected, q["答案"], canEditOption)}">
                            <span class="font-bold text-lg shrink-0 mt-1">${opt}.</span>
                            <div>
                                ${engParsed.options ? `<div class="text-xs opacity-70 mb-1 pre-wrap">${escapeHtml(engParsed.options[opt])}</div>` : ''}
                                <div class="text-base font-medium pre-wrap">${escapeHtml(chnParsed.options[opt])}</div>
                            </div>
                        </button>
                    `;
                });
                optionsHTML += `</div>`;
            } else {
                optionsHTML = `
                    <div class="mt-6 text-sm text-red-400">⚠️ 选项解析异常，请直接点击下方字母。</div>
                    <div class="grid grid-cols-4 gap-3 mt-2">
                        ${opts.map(opt => `
                            <button onclick="answerQuestion('${qId}', '${opt}', '${q["答案"]}')" ${canEditOption ? '' : 'disabled'}
                                class="py-4 rounded-xl font-bold text-xl border-2 transition ${getOptionClass(opt, progress.selected, q["答案"], canEditOption)}">${opt}</button>
                        `).join('')}
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="bg-blue-50 px-5 py-3 border-b border-blue-100 flex justify-between items-center text-sm">
                        <span class="font-bold text-blue-800">题目 #${qId}</span>
                        ${!canEditOption && !isExamMode ? `<button onclick="resetQuestion('${qId}')" class="text-gray-500 hover:text-blue-600 bg-white px-2 py-1 rounded border shadow-sm transition">🔄 重做此题</button>` : ''}
                    </div>
                    
                    <div class="p-5 md:p-8">
                        <div class="text-gray-500 mb-4 pre-wrap text-sm border-l-4 border-gray-300 pl-3">${escapeHtml(engParsed.qText)}</div>
                        <div class="text-gray-900 font-bold mb-2 pre-wrap text-lg md:text-xl leading-relaxed">${escapeHtml(chnParsed.qText)}</div>
                        
                        ${optionsHTML}
                        
                        <div class="${progress.status === 'wrong' && !isExamMode ? 'block' : 'hidden'} mt-6 p-4 bg-red-50 text-red-800 rounded-xl border border-red-200">
                            <div class="font-bold mb-1 flex items-center gap-2">❌ 回答错误！</div>
                            <div class="text-sm">您的选择是 <span class="font-bold text-lg">${progress.selected}</span> ，本题的正确答案是 <span class="font-bold text-lg text-green-600">${q["答案"]}</span>。</div>
                        </div>
                    </div>
                </div>
            `;

            // 更新页脚和下拉框状态
            // 考试模式下，强行禁用“上一题”
            document.getElementById('btn-prev').disabled = isExamMode || listIndex === 0;
            document.getElementById('btn-next').disabled = listIndex === currentList.length - 1;
            document.getElementById('page-indicator').innerText = `${listIndex + 1} / ${currentList.length}`;
            if (!isExamMode) document.getElementById('q-selector').value = listIndex; 
            document.getElementById('main-content').scrollTop = 0;
        }

        function getOptionClass(opt, selected, correct, canEditOption) {
            if (isExamMode) {
                // 考试模式：只有选中（变蓝）和未选中状态，不显示对错绿红
                if (opt === selected) return "bg-blue-500 border-blue-600 text-white shadow-md";
                return "bg-white border-gray-200 text-gray-700 hover:border-blue-400 hover:bg-blue-50 hover:shadow-md cursor-pointer";
            } else {
                // 练习模式逻辑
                if (canEditOption) return "bg-white border-gray-200 text-gray-700 hover:border-blue-400 hover:bg-blue-50 hover:shadow-md cursor-pointer";
                if (opt === correct) return "bg-green-500 border-green-600 text-white shadow-md"; 
                if (opt === selected && selected !== correct) return "bg-red-500 border-red-600 text-white"; 
                return "bg-gray-50 border-gray-100 text-gray-400 opacity-50 cursor-not-allowed"; 
            }
        }

        // ================= 6. 交互逻辑 =================
        function answerQuestion(qId, selectedOpt, correctOpt) {
            const isCorrect = (selectedOpt.trim().toUpperCase() === correctOpt.trim().toUpperCase());
            
            userProgress[qId] = {
                status: isCorrect ? 'correct' : 'wrong',
                selected: selectedOpt
            };
            
            localStorage.setItem(storageKey, JSON.stringify(userProgress));
            
            if (isExamMode) {
                // 考试模式：记录题号，仅刷新UI展现选中状态，不自动跳转
                examLog.add(qId);
                renderQuestion(currentList[listIndex]); 
            } else {
                // 练习模式：更新统计，重绘选项，答对自动跳转
                updateStats();
                renderSelector(); 
                renderQuestion(currentList[listIndex]); 

                if (isCorrect) {
                    setTimeout(() => {
                        if (listIndex < currentList.length - 1) nextQuestion();
                        else alert(currentFilter === 'wrong' ? "🎉 错题本已刷到底部！" : "🎉 所有题目都已刷完！");
                    }, 600);
                } 
            }
        }

        function resetQuestion(qId) {
            delete userProgress[qId];
            localStorage.setItem(storageKey, JSON.stringify(userProgress));
            updateStats();
            renderSelector();
            renderQuestion(currentList[listIndex]);
        }

        function prevQuestion() { 
            if (isExamMode) return; // 再次安全拦截
            if (listIndex > 0) { listIndex--; renderQuestion(currentList[listIndex]); } 
        }
        
        function nextQuestion() { 
            if (listIndex < currentList.length - 1) { listIndex++; renderQuestion(currentList[listIndex]); } 
        }
        
        function jumpToQuestion(idxInList) { 
            if (isExamMode) return;
            listIndex = parseInt(idxInList); renderQuestion(currentList[listIndex]); 
        }

        function renderSelector() {
            const sel = document.getElementById('q-selector');
            sel.innerHTML = currentList.map((realIdx, arrIdx) => {
                const q = qData[realIdx];
                const s = userProgress[q["题号"]]?.status;
                const icon = s === 'correct' ? '✅' : (s === 'wrong' ? '❌' : '⬜');
                return `<option value="${arrIdx}">${icon} 第 ${q["题号"]} 题</option>`;
            }).join('');
        }

        function updateStats() {
            let correct = 0, wrong = 0;
            Object.values(userProgress).forEach(p => {
                if (p.status === 'correct') correct++;
                if (p.status === 'wrong') wrong++;
            });
            document.getElementById('count-correct').innerText = correct;
            document.getElementById('count-wrong').innerText = wrong;
        }

        // ================= 7. 数据存档与导出逻辑 =================
        function toggleDataPanel() { document.getElementById('data-panel').classList.toggle('hidden'); }
        
        function exportProgress() {
            const exportData = { bankId: currentBankId, timestamp: new Date().toISOString(), progress: userProgress };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            const dateStr = new Date().toISOString().slice(0,10);
            dlAnchorElem.setAttribute("download", `${currentBankId}_progress_${dateStr}.json`);
            dlAnchorElem.click();
            dlAnchorElem.remove();
        }

        function exportWrongQuestions() {
            const wrongQuestions = [];
            qData.forEach(q => {
                const progress = userProgress[q["题号"]];
                if (progress && progress.status === 'wrong') {
                    wrongQuestions.push({ ...q, "用户错选": progress.selected });
                }
            });

            if (wrongQuestions.length === 0) {
                alert("太棒了！当前题库中没有错题，无需导出！🎉");
                return;
            }

            const jsContent = "const questionsData = " + JSON.stringify(wrongQuestions, null, 4) + ";\n";
            const dataStr = "data:text/javascript;charset=utf-8," + encodeURIComponent(jsContent);
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            const dateStr = new Date().toISOString().slice(0,10);
            dlAnchorElem.setAttribute("download", `${currentBankId}_all_wrong_questions_${dateStr}.js`);
            dlAnchorElem.click();
            dlAnchorElem.remove();
            
            alert(`✅ 成功导出 ${wrongQuestions.length} 道错题！`);
        }

        function importProgress(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.bankId && imported.bankId !== currentBankId) {
                        alert(`🚨 导入失败！\n\n该进度文件属于【${AVAILABLE_BANKS[imported.bankId]?.name || imported.bankId}】，而你当前打开的是【${AVAILABLE_BANKS[currentBankId].name}】。`);
                        document.getElementById('import-file').value = ""; 
                        return;
                    }
                    userProgress = imported.progress || imported;
                    localStorage.setItem(storageKey, JSON.stringify(userProgress));
                    updateStats();
                    applyFilter(currentFilter); 
                    alert("🎉 进度导入成功！");
                    document.getElementById('import-file').value = ""; 
                } catch (err) {
                    alert("❌ 文件格式错误，无法读取。");
                }
            };
            reader.readAsText(file);
        }

        function clearProgress() {
            if (confirm(`⚠️ 确定要清空【${AVAILABLE_BANKS[currentBankId].name}】的所有记录吗？此操作不可逆！`)) {
                userProgress = {};
                localStorage.removeItem(storageKey);
                updateStats();
                applyFilter('all'); 
            }
        }

        function escapeHtml(unsafe) {
            return (unsafe||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
